<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillVision 2030</title>
    <meta name="description" content="SkillVision 2030 - אבחון מיומנויות חכם לעתיד העבודה. גלו את הפרסונה המקצועית שלכם וקבלו תוכנית פעולה מעשית.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0d1525;
            --surface2: #111d35;
            --border: rgba(255,255,255,0.07);
            --text: #e8f0fe;
            --muted: #5a7090;
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.3);

            --owl: #c084fc;
            --owl-bg: rgba(192,132,252,0.08);
            --chameleon: #4ade80;
            --chameleon-bg: rgba(74,222,128,0.08);
            --dolphin: #38bdf8;
            --dolphin-bg: rgba(56,189,248,0.08);
            --octopus: #fb923c;
            --octopus-bg: rgba(251,146,60,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Dynamic Orbs Background ── */
        .bg-orbs {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
            mix-blend-mode: screen;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.45;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 50vw; height: 50vw; background: rgba(59,130,246,0.2); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 40vw; height: 40vw; background: rgba(168,85,247,0.15); bottom: -10%; right: -5%; animation-delay: -5s; }
        .orb-3 { width: 35vw; height: 35vw; background: rgba(74,222,128,0.1); top: 30%; left: 50%; animation-delay: -10s; }
        .orb-4 { width: 45vw; height: 45vw; background: rgba(56,189,248,0.12); top: 40%; left: -10%; animation-delay: -7s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, -5%) scale(1.05); }
            100% { transform: translate(-3%, 3%) scale(0.95); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative; z-index: 1;
        }

        /* ── SCREENS ── */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        .fade-out { animation: fadeOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); filter: blur(0); }
            to { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
        }

        .fade-in { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .stagger-1 { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.1s; }
        .stagger-2 { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s; }
        .stagger-3 { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s; }
        .stagger-4 { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s; }

        /* ── AI Analysis ── */
        #ai-analysis-block {
            border: 1px solid rgba(168,85,247,0.3);
            background: rgba(168,85,247,0.05);
            box-shadow: 0 0 30px rgba(168,85,247,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .ai-content p { margin-bottom: 14px; font-size: 1.05rem; line-height: 1.6; }
        .ai-content p:last-child { margin-bottom: 0; }
        .ai-content strong { color: #c084fc; font-weight: 700; text-shadow: 0 0 15px rgba(192,132,252,0.4); }
        .ai-loading {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 20px; color: var(--muted); font-weight: 700;
        }
        .ai-spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: ai-spin 1s linear infinite;
        }
        @keyframes ai-spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════
           WELCOME SCREEN
        ══════════════════════════════════════ */
        .welcome-wrap {
            min-height: 90vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            color: #93c5fd;
            padding: 6px 16px; border-radius: 999px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .badge::before { content: ''; width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

        .welcome-title {
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #e8f0fe 0%, #93c5fd 50%, #c084fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .welcome-year {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: var(--muted);
            letter-spacing: 8px;
            margin-bottom: 40px;
        }
        .welcome-desc {
            max-width: 540px;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 50px;
        }

        /* Persona pills */
        .personas-row {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 50px;
        }
        .persona-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 18px; border-radius: 999px;
            font-size: 0.9rem; font-weight: 700;
            border: 1px solid;
        }
        .persona-pill.owl   { color: var(--owl);      border-color: var(--owl);      background: var(--owl-bg); }
        .persona-pill.cham  { color: var(--chameleon); border-color: var(--chameleon); background: var(--chameleon-bg); }
        .persona-pill.dolph { color: var(--dolphin);  border-color: var(--dolphin);  background: var(--dolphin-bg); }
        .persona-pill.oct   { color: var(--octopus);  border-color: var(--octopus);  background: var(--octopus-bg); }

        /* ── CTA Button ── */
        .btn-cta {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, var(--accent) 0%, #c084fc 50%, var(--accent) 100%);
            background-size: 200% auto;
            color: white; border: none;
            padding: 18px 52px; border-radius: 14px;
            font-family: 'Heebo', sans-serif;
            font-weight: 900; font-size: 1.15rem;
            cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(59,130,246,0.3);
            animation: shine-bg 4s linear infinite;
        }
        @keyframes shine-bg { to { background-position: 200% center; } }
        .btn-cta:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(192,132,252,0.4);
        }
        .btn-cta::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
        }

        /* ══════════════════════════════════════
           QUIZ SCREEN
        ══════════════════════════════════════ */
        .quiz-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .q-counter {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem; color: var(--muted);
        }
        .q-counter span { color: var(--text); font-weight: 700; }

        .progress-track {
            flex: 1; margin: 0 20px;
            height: 4px; background: var(--surface2);
            border-radius: 999px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            width: 0%; transition: width 0.4s ease;
            border-radius: 999px;
            position: relative;
            box-shadow: 0 0 10px rgba(168,85,247,0.5);
        }
        .progress-fill::after {
            content: ''; position: absolute; right: 0; top: -50%;
            height: 200%; width: 10px; background: white;
            border-radius: 50%; filter: blur(3px); opacity: 0.8;
        }

        .quiz-card {
            background: rgba(13, 21, 37, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            overflow: hidden;
            min-height: 480px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .quiz-top {
            padding: 40px 50px 30px;
        }

        .q-category {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .q-cat-dot { width: 8px; height: 8px; border-radius: 50%; }

        .q-text {
            font-size: clamp(1.3rem, 2.5vw, 1.75rem);
            font-weight: 700;
            line-height: 1.45;
            color: var(--text);
        }

        .scale-section {
            padding: 30px 50px 40px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
        }

        .scale-labels {
            display: flex; justify-content: space-between;
            font-size: 0.78rem; color: var(--muted);
            margin-bottom: 12px;
            font-family: 'Space Mono', monospace;
        }

        .scale-btns {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
        }

        .scale-btn {
            background: rgba(17, 29, 53, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text);
            padding: 22px 10px;
            border-radius: 14px;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            z-index: 1;
        }
        .scale-btn::before {
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s; z-index: -1; transform: scale(0.5);
        }
        .scale-btn:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.08);
            color: white;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .scale-btn:hover::before { 
            opacity: 1; transform: scale(1.5); transition: transform 0.5s, opacity 0.2s; 
        }
        .scale-btn:active { transform: translateY(0) scale(0.95); }

        /* ══════════════════════════════════════
           RESULTS SCREEN
        ══════════════════════════════════════ */
        .results-hero {
            background: rgba(13, 21, 37, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            margin-bottom: 24px;
            position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .results-hero::before {
            content: '';
            position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(80px); opacity: 0.15;
            pointer-events: none;
        }
        .hero-icon {
            font-size: 5rem; line-height: 1;
            margin-bottom: 16px;
            display: block;
            filter: drop-shadow(0 0 30px currentColor);
        }
        .hero-name {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900; letter-spacing: -1px;
            margin-bottom: 14px;
        }
        .hero-desc {
            max-width: 600px; margin: 0 auto;
            color: var(--muted); line-height: 1.65;
            font-size: 1.05rem;
        }

        .results-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-bottom: 20px;
            align-items: start;
        }

        #radarChart { width: 100% !important; max-height: 400px; }

        .card {
            background: rgba(13, 21, 37, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            color: #8ba4c0; margin-bottom: 20px;
        }

        /* Mission */
        .mission-type {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 999px;
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            margin-bottom: 16px;
        }
        .mission-type.commando {
            background: rgba(251,146,60,0.12);
            border: 1px solid rgba(251,146,60,0.4);
            color: #fb923c;
        }
        .mission-type.growth {
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.3);
            color: #4ade80;
        }

        .mission-text {
            font-size: 1.05rem; font-weight: 700;
            line-height: 1.5; margin-bottom: 12px;
            color: var(--text);
        }

        .divider { height: 1px; background: var(--border); margin: 20px 0; }

        .learning-item {
            display: flex; gap: 12px; align-items: flex-start;
            margin-bottom: 14px;
        }
        .learning-pct {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem; font-weight: 700;
            color: var(--accent);
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            padding: 3px 9px; border-radius: 6px;
            flex-shrink: 0; margin-top: 2px;
        }
        .learning-body { font-size: 0.9rem; color: #9ab3cc; line-height: 1.5; }
        .learning-body b { color: var(--text); }

        .write-area {
            margin-top: 10px;
            width: 100%;
            min-height: 80px;
            background: rgba(255,255,255,0.04);
            border: 1px dashed rgba(255,255,255,0.25);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'Heebo', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            display: block;
            box-sizing: border-box;
        }
        .write-area::placeholder { color: rgba(255,255,255,0.25); }
        .write-area:focus {
            border-color: rgba(255,255,255,0.45);
            background: rgba(255,255,255,0.06);
        }

        .actions-bar {
            display: flex; gap: 14px; justify-content: center;
            margin-top: 20px; margin-bottom: 50px;
        }
        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 32px; border-radius: 12px;
            font-family: 'Heebo', sans-serif;
            font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--accent); background: rgba(59,130,246,0.06); }

        /* Chart styles — size set in results-grid block above */

        /* ── Score bar visualization ── */
        .score-bars { margin-top: 0; }
        .score-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }
        .score-label {
            font-size: 0.82rem; min-width: 110px;
            color: #9ab3cc; text-align: right;
        }
        .score-bar-wrap {
            flex: 1; display: flex; align-items: center; gap: 8px;
        }
        .score-bar-track {
            flex: 1; height: 8px; background: var(--surface2);
            border-radius: 999px; overflow: hidden;
        }
        .score-bar-fill {
            height: 100%; border-radius: 999px;
            transition: width 1s cubic-bezier(0.4,0,0.2,1);
        }
        .score-val {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem; color: #8ba4c0;
            min-width: 20px; text-align: left;
        }

        @media (max-width: 700px) {
            .quiz-top, .scale-section { padding: 28px 24px; }
            .results-grid { grid-template-columns: 1fr; }
            .quiz-header { flex-direction: column; gap: 10px; align-items: stretch; }
            .q-counter { text-align: center; }
            .progress-track { margin: 0; }
        }

        @media print {
            body { background: white; color: #111; }
            .actions-bar { display: none; }
            .card, .results-hero { 
                background: white !important;
                border: 1px solid #ddd !important; 
                break-inside: avoid; 
                color: #111 !important;
            }
            .card-title { color: #555 !important; }
            .hero-desc, .learning-body, .score-label, .score-val { color: #333 !important; }
            .mission-text { color: #111 !important; }
            .results-grid { grid-template-columns: 1fr; }
            body::before, .grid-lines { display: none; }
            .write-area {
                background: #f9f9f9 !important;
                border: 1px solid #aaa !important;
                color: #111 !important;
                min-height: 80px;
            }
            .write-area::placeholder { color: #aaa !important; }
            .learning-pct { 
                background: #e8f0fe !important; 
                color: #2563eb !important;
                border: 1px solid #93c5fd !important;
            }
            .mission-type { border: 1px solid #ccc !important; }
            .mission-type.commando { background: #fff3e0 !important; color: #c2410c !important; }
            .mission-type.growth { background: #f0fdf4 !important; color: #15803d !important; }
            .divider { background: #e5e7eb !important; }
        }
    </style>
</head>
<body>
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
</div>

<div class="container">

    <!-- ─── WELCOME ─── -->
    <section id="screen-welcome" class="screen active">
        <div class="welcome-wrap">
            <div class="badge">WEF Future Skills Assessment</div>
            <h1 class="welcome-title">SkillVision</h1>
            <p class="welcome-year">2 0 3 0</p>
            <p class="welcome-desc">גלו את פרופיל ה-DNA המקצועי שלכם וצאו עם משימה ממוקדת ליישום מיידי.</p>
            <div class="personas-row">
                <div class="persona-pill owl">🦉 ינשוף אסטרטגי</div>
                <div class="persona-pill cham">🦎 זיקית דינמית</div>
                <div class="persona-pill dolph">🐬 דולפין מחבר</div>
                <div class="persona-pill oct">🐙 תמנון דיגיטלי</div>
            </div>
            <button class="btn-cta" onclick="app.start()">התחל אבחון →</button>
        </div>
    </section>

    <!-- ─── QUIZ ─── -->
    <section id="screen-quiz" class="screen">
        <div class="quiz-header">
            <div class="q-counter">שאלה <span id="q-num">1</span> / 21</div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div class="quiz-card">
            <div class="quiz-top">
                <div id="q-category" class="q-category"></div>
                <div id="q-text" class="q-text"></div>
            </div>
            <div class="scale-section">
                <div class="scale-labels">
                    <span>בכלל לא</span>
                    <span>מאוד</span>
                </div>
                <div class="scale-btns">
                    <button class="scale-btn" aria-label="1 - בכלל לא" onclick="app.handleChoice(1)">1</button>
                    <button class="scale-btn" aria-label="2 - מעט" onclick="app.handleChoice(2)">2</button>
                    <button class="scale-btn" aria-label="3 - במידה בינונית" onclick="app.handleChoice(3)">3</button>
                    <button class="scale-btn" aria-label="4 - במידה רבה" onclick="app.handleChoice(4)">4</button>
                    <button class="scale-btn" aria-label="5 - מאוד" onclick="app.handleChoice(5)">5</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ─── RESULTS ─── -->
    <section id="screen-results" class="screen">
        <div id="res-hero" class="results-hero stagger-1"></div>

        <div id="ai-analysis-block" class="card stagger-2" style="display: none; margin-bottom: 24px;">
            <div class="card-title">הניתוח האישי שלך ✨</div>
            <div id="ai-analysis-content" class="ai-content">
                <div class="ai-loading">
                    <div class="ai-spinner"></div>
                    <div>מנתח את הפרופיל שלך...</div>

        <div class="results-grid">
            <div id="growth-card" class="card stagger-3"></div>

        <div class="actions-bar no-print">
            <button class="btn-cta" onclick="window.print()">📥 הורד דוח PDF</button>
            <button class="btn-secondary" onclick="location.reload()">↺ אבחון מחדש</button>
        </div>
    </section>
</div>

<script>
const PERSONAS = {

        colorBg: "rgba(192,132,252,0.1)",
        icon: "🦉",
        desc: "הארכיטקט. היכולת שלך לנתח מגמות ולחבר בין נקודות דאטה הופכת אותך למצפן הארגוני.",
        mission70: "משימת Zoom Out: הקדישו 30 דקות שבועיות למיפוי השפעות פרויקט על מטרות 2030.",
        missionCommando: "משימת קומנדו: בניית מודל תרחישים (4 תרחישי 'מה אם') והצגתם להנהלה."

const CAT_COLORS = {

const app = {
    step: 0,

    questions: [
        { cluster: "Owl", cat: "ינשוף אסטרטגי", text: "כשאני נתקל בבעיה סבוכה, אני נוטה לפרק אותה לשלבים ומרכיבים לפני שאני פועל." },
        { cluster: "Owl", cat: "ינשוף אסטרטגי", text: "אני מוצא את עצמי מציע רעיונות יצירתיים שחורגים מהסטנדרט המקובל בארגון." },
        { cluster: "Owl", cat: "ינשוף אסטרטגי", text: "קל לי לראות כיצד שינוי קטן בצוות שלי ישפיע על מחלקות אחרות בטווח הרחוק." },
        { cluster: "Owl", cat: "ינשוף אסטרטגי", text: "אני מצליח לחבר בין תחומי תוכן שונים כדי לייצר פתרונות או ערך חדש." },
        { cluster: "Owl", cat: "ינשוף אסטרטגי", text: "אני נוהג לחקור ולהתעדכן במגמות שוק וטכנולוגיה לפני שהן הופכות לשיח המרכזי." },
        { cluster: "Chameleon", cat: "זיקית דינמית", text: "אני מצליח לתפקד ביעילות ולשמור על מיקוד גם כשסדר העדיפויות משתנה מהרגע להרגע." },
        { cluster: "Chameleon", cat: "זיקית דינמית", text: "אני מסוגל לקבל החלטות ולהתקדם במשימה גם כשיש חוסר בוודאות או בנהלים ברורים." },
        { cluster: "Chameleon", cat: "זיקית דינמית", text: "אני דואג להקצות זמן ביומן ללמידה עצמאית ולהתפתחות מקצועית באופן קבוע." },
        { cluster: "Chameleon", cat: "זיקית דינמית", text: "גם כשמבקרים את העבודה שלי, אני מתמקד בשיפור הביצועים במקום להתגונן." },
        { cluster: "Chameleon", cat: "זיקית דינמית", text: "אני מודע לנקודות התורפה המקצועיות שלי ולא מהסס לבקש עזרה כשצריך." },
        { cluster: "Dolphin", cat: "דולפין מחבר", text: "קולגות נוטים ללכת אחרי הצעות שלי, גם אם אני לא המנהל הרשמי." },
        { cluster: "Dolphin", cat: "דולפין מחבר", text: "אני רגיש לדינמיקה בחדר ומתאים את סגנון התגובה שלי למצב הרוח של הצד השני." },
        { cluster: "Dolphin", cat: "דולפין מחבר", text: "אני מצליח לרתום אנשים למטרות משותפות דרך בניית אמון ולא דרך כוח." },
        { cluster: "Dolphin", cat: "דולפין מחבר", text: "בשיחות מקצועיות, אני מקפיד להקשיב עד הסוף כדי להבין את הצד השני באמת." },
        { cluster: "Dolphin", cat: "דולפין מחבר", text: "חשוב לי להשקיע זמן בלתת מילה טובה שתעזור לעמיתיי להתקדם." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "אני משתמש בכלי בינה מלאכותית (כמו ChatGPT) כחלק בלתי נפרד משיטות העבודה שלי." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "אני תמיד בודק ומצליב מקורות מידע לפני שאני מסתמך על נתונים דיגיטליים." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "כשאני מקבל כלי טכנולוגי חדש, אני לומד לתפעל אותו במהירות ובצורה עצמאית." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "אני מהראשונים בצוות לאמץ תוכנות או פיצ'רים חדשים שנכנסים לעבודה." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "אני מחפש באופן אקטיבי אוטומציות שיכולות לחסוך לי זמן במשימות חוזרות." },
        { cluster: "Octopus", cat: "תמנון דיגיטלי", text: "אני מבין את המשמעות של 'ביג דאטה' ויודע איך לשאול את השאלות הנכונות." }
    ],

    show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    start() { this.show('screen-quiz'); this.renderQ(); },

    renderQ() {
        const q = this.questions[this.step];
        const color = CAT_COLORS[q.cat] || '#3b82f6';
        
        const qText = document.getElementById('q-text');
        qText.classList.remove('fade-in');
        void qText.offsetWidth; // trigger reflow
        qText.classList.add('fade-in');

        document.getElementById('q-num').textContent = this.step + 1;
        document.getElementById('progress-fill').style.width = (((this.step) / this.questions.length) * 100) + '%';
        document.getElementById('q-category').innerHTML = '';
        document.getElementById('q-text').textContent = q.text;
    },

    handleChoice(val) {
        this.scores[this.questions[this.step].cluster] += val;
        
        // Final progress fill when done
        document.getElementById('progress-fill').style.width = (((this.step + 1) / this.questions.length) * 100) + '%';
        
        if (this.step < this.questions.length - 1) {
            this.step++; 
            setTimeout(() => this.renderQ(), 150);
        } else {
            setTimeout(() => this.showResults(), 200);
        }
    },

    showResults() {
        this.show('screen-results');
        const order = ['Owl', 'Chameleon', 'Dolphin', 'Octopus'];
        const winner = order.reduce((a, b) => this.scores[a] >= this.scores[b] ? a : b);
        const isMaster = this.scores[winner] >= 19;
        const p = PERSONAS[winner];

        // Hero
        const hero = document.getElementById('res-hero');
        hero.style.setProperty('--glow-color', p.color);
        hero.innerHTML = `
            <style>#res-hero::before { background: ${p.color} !important; }</style>
            <span class="hero-icon stagger-1">${p.icon}</span>
            <div class="hero-name stagger-2" style="color:${p.color}">${p.name}</div>
            <div class="hero-desc stagger-3">${p.desc}</div>
        `;
        hero.style.borderColor = p.color + '44';

        // Map persona scores (max 25 each) → 10 WEF skills (scale to 0–100)
        // Each skill draws from 1–2 personas with weights
        const S = this.scores;
        const norm = k => Math.round((S[k] / 25) * 100);
        const mix  = (k1, w1, k2, w2) => Math.round((S[k1]*w1 + S[k2]*w2) / 25 * 100);

        const wefSkills = [
            { label: 'חשיבה אנליטית',          score: norm('Owl'),                        color: '#c084fc' },
            { label: 'חוסן וגמישות',            score: norm('Chameleon'),                  color: '#4ade80' },
            { label: 'מנהיגות והשפעה',          score: mix('Dolphin',0.7,'Owl',0.3),       color: '#38bdf8' },
            { label: 'חשיבה יצירתית',           score: mix('Owl',0.6,'Chameleon',0.4),     color: '#c084fc' },
            { label: 'מודעות עצמית',            score: mix('Chameleon',0.6,'Dolphin',0.4), color: '#4ade80' },
            { label: 'אוריינות טכנולוגית',      score: mix('Octopus',0.7,'Owl',0.3),       color: '#fb923c' },
            { label: 'אמפתיה והקשבה',           score: norm('Dolphin'),                    color: '#38bdf8' },
            { label: 'סקרנות ולמידה עצמית',     score: mix('Chameleon',0.5,'Octopus',0.5), color: '#4ade80' },
            { label: 'ניהול טאלנט',             score: mix('Dolphin',0.6,'Chameleon',0.4), color: '#38bdf8' },
            { label: 'AI וביג דאטה',            score: norm('Octopus'),                    color: '#fb923c' },
        ];

        // Right card — persona bars + mission
        const barColors = { Owl:'#c084fc', Chameleon:'#4ade80', Dolphin:'#38bdf8', Octopus:'#fb923c' };
        const barLabels = { Owl:'ינשוף אסטרטגי', Chameleon:'זיקית דינמית', Dolphin:'דולפין מחבר', Octopus:'תמנון דיגיטלי' };
        const maxScore = 25;
        const scoreBarsHTML = order.map((k, i) => `
            <div class="score-row stagger-${(i%3)+1}">
                <div class="score-label">${PERSONAS[k].icon} ${barLabels[k]}</div>
                <div class="score-bar-wrap">
                    <div class="score-bar-track">
                        <div class="score-bar-fill" style="width:${(this.scores[k]/maxScore)*100}%;background:${barColors[k]}"></div>
                    </div>
                    <div class="score-val">${this.scores[k]}</div>
                </div>
            </div>
        `).join('');

        const isComm = isMaster;
        document.getElementById('growth-card').innerHTML = `
            <div class="card-title">פרופיל לפי פרסונה</div>
            <div class="score-bars">${scoreBarsHTML}</div>
            <div class="divider"></div>
            <div class="card-title">תוכנית פעולה</div>
            <div class="mission-type ${isComm ? 'commando' : 'growth'}">
                ${isComm ? '⚡ משימת קומנדו' : '🌱 משימת צמיחה'}
            </div>
            <div class="mission-text">${isComm ? p.missionCommando : p.mission70}</div>
            <div style="font-size:0.85rem;color:#9ab3cc;line-height:1.5">
                ${isComm ? 'כיעד מאסטר, המשימה שלך היא לייצר אימפקט ארגוני רחב.' : 'המטרה היא חיזוק שריר המיומנות דרך התנסות בשטח.'}
            </div>
            <div class="divider"></div>
            <div class="learning-item">
                <div class="learning-pct">20%</div>
                <div class="learning-body"><b>למידה מעמיתים:</b> חפש עמית בקבוצת ה-${p.name} והתייעץ על אתגרי המשימה.</div>
            </div>
            <div class="learning-item">
                <div class="learning-pct">10%</div>
                <div class="learning-body"><b>למידה פורמלית:</b> צפה במיני-קורס "מיומנויות 2030" בפורטל הארגוני.</div>
            </div>
            <div class="divider"></div>
            <div style="font-size:0.8rem;color:#8ba4c0;font-family:'Space Mono',monospace;margin-bottom:10px;">משימה אישית לשבוע הקרוב</div>
            <textarea class="write-area" placeholder="כתבו כאן את המשימה שתיקחו איתכם..."></textarea>
        `;

        this.initChart(wefSkills);
        this.fetchAIAnalysis(PERSONAS[winner].name);
    },

    initChart(wefSkills) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        const labels = wefSkills.map(s => s.label);
        const data   = wefSkills.map(s => s.score);

        // gradient fill
        const gradient = ctx.createRadialGradient(0,0,0,0,0,200);
        gradient.addColorStop(0, 'rgba(59,130,246,0.25)');
        gradient.addColorStop(1, 'rgba(168,85,247,0.08)');

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels,
                datasets: [{
                    data,
                    backgroundColor: gradient,
                    borderColor: 'rgba(99,155,255,0.8)',
                    borderWidth: 2,
                    pointBackgroundColor: wefSkills.map(s => s.color),
                    pointBorderColor: 'transparent',
                    pointRadius: 5,
                    pointHoverRadius: 7,
                }]
            },
            options: {
                responsive: true,
                scales: {
                    r: {
                        beginAtZero: true, max: 100,
                        ticks: { display: false, stepSize: 25 },
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        angleLines: { color: 'rgba(255,255,255,0.06)' },
                        pointLabels: {
                            color: '#9ab3cc',
                            font: { family: 'Heebo', size: 11, weight: '600' },
                            padding: 8
                        }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    },

    async fetchAIAnalysis(winnerName) {
        const block = document.getElementById('ai-analysis-block');
        const content = document.getElementById('ai-analysis-content');
        
        block.style.display = 'block';
        content.innerHTML = `
            <div class="ai-loading">
                <div class="ai-spinner"></div>
                <div>מנתח את הפרופיל שלך...</div>
            </div>
        `;

        const prompt = `אתה יועץ פיתוח מקצועי בארגון ישראלי. קיבלת תוצאות אבחון מיומנויות עתיד של עובד.

ציוני הפרסונות (מתוך 25 לכל אחת):
- ינשוף אסטרטגי (חשיבה אנליטית ויצירתית): ${this.scores.Owl}/25
- זיקית דינמית (גמישות ולמידה): ${this.scores.Chameleon}/25
- דולפין מחבר (מנהיגות ואמפתיה): ${this.scores.Dolphin}/25
- תמנון דיגיטלי (אוריינות טכנולוגית): ${this.scores.Octopus}/25

הפרסונה הדומיננטית: ${winnerName}

כתוב ניתוח אישי קצר ב-3 פסקאות בעברית (סה"כ עד 150 מילים):

1. **מי אתה**: תאר את השילוב הייחודי של הפרסונות (לא רק הדומיננטית — התייחס לפרופיל כולו, החוזקות ההדדיות).

2. **הנקודה העיוורת**: זהה את המיומנות הכי חלשה ותן הסבר קצר למה היא חשובה בעולם של 2030.

3. **משימה לשבוע הבא**: תן משימה אחת קונקרטית ומדידה שמחזקת את הנקודה החלשה. כלול יום ומשך זמן מוצע.

הנחיות סגנון:
- כתוב בגוף שני (אתה/את)
- טון חם ומקצועי, לא פורמלי מדי
- אל תשתמש באימוג'ים
- אל תחזור על שמות הפרסונות באנגלית`;

        try {
            // הוספת חלון קופץ להזנת מפתח API למטרת הרצה מקומית במחשב
            const apiKey = window.prompt("🚀 כדי לחבר את הכלי ל-AI, אנא הדבק את מפתח ה-API שלך מ-Anthropic (Claude):\n\n(אם אין לך או שאתה רק רוצה לבדוק את העיצוב, השאר ריק ולחץ ביטול)", "");
            
            if (!apiKey) {
                block.style.display = 'none'; // אם אין מפתח, ממשיכים בלי הבלוק של ה-AI
                return;
            }

            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "x-api-key": apiKey.trim(),
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true"
                },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20240620", // The correct model identifier
                    max_tokens: 1000,
                    messages: [{
                        role: "user",
                        content: prompt
                    }]
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || `HTTP ${response.status}`);
            }

            const data = await response.json();
            const textResponse = data.content?.[0]?.text || '';
            
            if (textResponse) {
                const paragraphs = textResponse.split('\n\n').filter(p => p.trim() !== '');
                content.innerHTML = paragraphs.map(p => {
                    const htmlP = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    return `<p>${htmlP}</p>`;
                }).join('');
            } else {
                throw new Error('Empty API response');
            }

        } catch (error) {
            console.error('AI Analysis failed:', error);
            content.innerHTML = `<div style="color: #ff4d4f; background: rgba(255,0,0,0.1); padding: 15px; border-radius: 12px; font-family: 'Space Mono', monospace; font-size: 0.85rem; direction: ltr; text-align: left;">
                                    <b>❌ תקלת התחברות ל-API</b><br>
                                    ${error.message.includes('Failed to fetch') ? 'שגיאת רשת / CORS (נסה להריץ דרך שרת מקומי)' : error.message}
                                 </div>`;
        }
    }
};
</script>
</body>
</html>
